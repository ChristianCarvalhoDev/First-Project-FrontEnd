<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bishop Games | Sua Loja Virtual</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="nav">
            <div class="logo">Bishop<span>Games</span></div>
            <ul class="nav-links">
                <li><a href="#">Início</a></li>
                <li><a href="#">PC</a></li>
                <li><a href="#">Consoles</a></li>
                <li><a href="#">Acessórios</a></li>
            </ul>
            <div class="nav-icons">
                <i class="fas fa-search"></i>
                <div class="cart-icon">
                    <a href="cart.html" class="cart-link">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span></a>
                </div>
                <i class="fas fa-user"></i>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>UPGRADE SEU SETUP</h1>
                <p>As melhores ofertas em lançamentos e periféricos de elite.</p>
                <a href="#" class="btn-main">Explorar Agora</a>
            </div>
        </section>

       <section class="products-container">
            <h2>Destaques da Semana</h2>
            <div class="product-grid" id="product-grid">
                <div class="product-card">
                    <div class="badge"></div>
                    <img src="https://gaming-cdn.com/images/products/16086/616x353/elden-ring-shadow-of-the-erdtree-playstation-5-playstation-4-game-playstation-store-europe-cover.jpg?v=1735895775" alt="Jogo">
                    <div class="product-info">
                        <h3>Elden Ring - Shadow of the Erdtree</h3>
                        <p class="price">R$ 199,90</p>
                        <button class="btn-add">Adicionar ao Carrinho</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
<script src="script.js"></script>
</body>
</html>
